<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brunno Lukka — Press Photo</title>
    <meta
      name="description"
      content="Official press photo — Brunno Lukka. Download high-resolution image for media and bookings."
    />
    <meta property="og:title" content="Brunno Lukka — Press Photo" />
    <meta property="og:image" content="./src/brunnolukkapress.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }
    </style>
  </head>

  <body class="h-[100dvh] bg-white text-neutral-900 overflow-hidden flex flex-col">
    <header
      class="shrink-0 flex items-center justify-between gap-4 px-4 py-3 border-b border-neutral-200 bg-white/95 backdrop-blur z-10"
    >
      <div class="min-w-0">
        <p class="text-xs uppercase tracking-[0.2em] text-neutral-500">Press photo</p>
        <h1 class="text-lg font-semibold truncate">Brunno Lukka</h1>
      </div>
      <a
        href="./index.html"
        class="text-sm text-neutral-600 hover:text-neutral-900 whitespace-nowrap"
        >← Site</a
      >
    </header>

    <main class="flex-1 min-h-0 flex items-center justify-center p-4 md:p-8 bg-white">
      <img
        src="./src/brunnolukkapress.png"
        alt="Brunno Lukka — official press photo"
        class="max-w-full max-h-full w-auto h-auto object-contain select-none"
        width="1240"
        height="848"
        draggable="false"
      />
    </main>

    <footer
      class="shrink-0 px-4 py-4 border-t border-neutral-200 bg-neutral-50 flex flex-col sm:flex-row items-stretch sm:items-center justify-center gap-3 z-10"
    >
      <a
        id="downloadBtn"
        href="./src/brunnolukkapress.png"
        download="Brunno-Lukka-Press-Photo.png"
        class="inline-flex items-center justify-center gap-2 px-6 py-3 bg-neutral-900 hover:bg-neutral-800 text-white text-sm font-semibold rounded-full transition"
      >
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M7 10l5 5m0 0l5-5m-5 5V4"
          />
        </svg>
        Download press photo (PNG)
      </a>
      <button
        id="copyLinkBtn"
        type="button"
        class="inline-flex items-center justify-center gap-2 px-6 py-3 bg-white border border-neutral-300 hover:border-neutral-400 text-neutral-800 text-sm font-semibold rounded-full transition"
      >
        Copy direct image link
      </button>
      <p id="copyFeedback" class="hidden sm:absolute sm:bottom-20 text-sm text-emerald-600 font-medium text-center">
        Link copied
      </p>
    </footer>

    <p class="sr-only">1240 × 848 pixels, PNG</p>

    <script>
      const imageUrl = new URL("./src/brunnolukkapress.png", window.location.href).href;

      document.getElementById("copyLinkBtn").addEventListener("click", async () => {
        const feedback = document.getElementById("copyFeedback");
        try {
          await navigator.clipboard.writeText(imageUrl);
          feedback.classList.remove("hidden");
          setTimeout(() => feedback.classList.add("hidden"), 2500);
        } catch {
          window.prompt("Copy this link:", imageUrl);
        }
      });
    </script>
  </body>
</html>
