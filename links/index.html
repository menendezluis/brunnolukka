<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brunno Lukka — Links</title>
    <meta
      name="description"
      content="All official links — music, sets and press for Brunno Lukka."
    />
    <meta property="og:title" content="Brunno Lukka — Links" />
    <meta property="og:image" content="../src/brunnolukka.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap");

      body {
        font-family: "Inter", sans-serif;
      }

      video.bg-video {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        min-height: 100%;
        object-fit: cover;
        z-index: -2;
      }

      .neon-cyan {
        color: #00f0ff;
        text-shadow: 0 0 10px rgba(0, 240, 255, 0.45);
      }

      .link-btn {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.6rem;
        width: 100%;
        min-height: 62px;
        padding: 0.9rem 3rem;
        border-radius: 9999px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        background: rgba(255, 255, 255, 0.07);
        backdrop-filter: blur(4px);
        font-weight: 700;
        font-size: 1.05rem;
        letter-spacing: 0.02em;
        transition: all 0.2s ease;
      }

      .link-btn:hover {
        border-color: rgba(0, 240, 255, 0.6);
        background: rgba(0, 240, 255, 0.14);
        box-shadow: 0 0 24px rgba(0, 240, 255, 0.22);
        transform: translateY(-2px);
      }

      .link-btn .icon {
        position: absolute;
        left: 1.25rem;
        width: 26px;
        height: 26px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .link-btn .icon svg {
        width: 100%;
        height: 100%;
      }
    </style>
  </head>

  <body class="min-h-[100dvh] bg-black text-white">
    <video class="bg-video" autoplay muted loop playsinline>

          alt="Brunno Lukka"
          class="w-28 h-28 mx-auto rounded-full object-cover border-2 border-cyan-400/50 shadow-lg shadow-cyan-500/20 mb-4"
        />
        <h1 class="text-2xl md:text-3xl font-extrabold tracking-wide">Brunno Lukka</h1>
        <p class="text-xs text-cyan-300/90 mt-1.5 uppercase tracking-[0.25em]">
          DJ / Producer
        </p>
        <p class="text-xs text-white/50 mt-1.5">Tech House · Hard Groove</p>

</html>
