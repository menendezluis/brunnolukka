<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brunno Lukka — Tik Tak</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js"></script>
    <script src="https://unpkg.com/@barba/core"></script>
    <style>
      video.bg-video {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        min-height: 100%;
        object-fit: cover;
        z-index: -1;
      }
    </style>
  </head>

  <body
    class="relative min-h-[100dvh] bg-black text-white overflow-y-auto"
    data-barba="wrapper"
  >
    <div data-barba="container" data-barba-namespace="tik-tak">
      <a href="./index.html" class="absolute top-6 left-6 z-20">
        <img
          src="./logobrunno.png"
          alt="Brunno Lukka"
          class="h-12 md:h-16 hover:opacity-80 transition"
        />
      </a>

      <video class="bg-video" autoplay muted loop playsinline>
        <source src="./src/bg-loop.mp4" type="video/mp4" />
      </video>

      <div class="absolute inset-0 bg-black/65 z-0"></div>

      <main
        class="relative z-10 flex flex-col items-center justify-center text-center min-h-[100dvh] space-y-6 px-4 py-10"
      >
        <div class="w-full max-w-sm md:max-w-md">
          <img
            src="./src/tiktak.jpg"
            alt="Tik Tak cover art"
            class="w-full rounded-xl shadow-2xl border border-white/20"
          />
        </div>

        <p class="text-xs md:text-sm uppercase tracking-[3px] text-gray-300">
          Brunno Lukka
        </p>
        <h1 class="text-3xl md:text-4xl font-semibold tracking-wide drop-shadow-lg">
          Tik Tak
        </h1>
        <p class="text-sm md:text-base text-cyan-300 max-w-2xl">
          Tech House con groove latino y energía de pista; 128 BPM, pensado para el club.
        </p>

        <div class="bg-white/10 border border-cyan-400/40 rounded-xl px-5 py-4 max-w-xl w-full">
          <p class="text-xs uppercase tracking-widest text-cyan-300 mb-1">Release</p>
          <p class="text-sm text-white/90">11 de junio · All platforms</p>
        </div>

        <div class="bg-black/40 border border-white/20 rounded-xl px-5 py-4 w-full max-w-xl">
          <p class="text-xs uppercase tracking-widest text-gray-300 mb-2">Countdown to release</p>
          <p id="countdown" class="text-xl md:text-2xl font-semibold text-white">
            Loading countdown...
          </p>
        </div>

        <div class="flex flex-wrap justify-center gap-3 mt-1">
          <a
            href="https://open.spotify.com/artist/4Y4H5coOYsdCFUSCGg8tRK"
            target="_blank"
            rel="noopener noreferrer"
            class="px-3 md:px-4 py-2 bg-green-500/80 hover:bg-green-500 rounded-full text-xs md:text-sm font-semibold transition"
            >Spotify</a
          >
          <a
            href="https://www.youtube.com/@brunnolukka"
            target="_blank"
            rel="noopener noreferrer"
            class="px-3 md:px-4 py-2 bg-red-600/80 hover:bg-red-600 rounded-full text-xs md:text-sm font-semibold transition"
            >YouTube</a
          >
          <a
            href="https://www.instagram.com/brunnolukka"
            target="_blank"
            rel="noopener noreferrer"
            class="px-3 md:px-4 py-2 bg-pink-600/80 hover:bg-pink-600 rounded-full text-xs md:text-sm font-semibold transition"
            >Instagram</a
          >
        </div>
      </main>
    </div>

    <script>
      const countdownTarget = new Date("2026-06-11T00:00:00-06:00");
      const countdownEl = document.getElementById("countdown");

      function updateCountdown() {
        const now = new Date();
        const diff = countdownTarget - now;

        if (diff <= 0) {
          countdownEl.textContent = "Out now on all platforms";
          return;
        }

        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
        const minutes = Math.floor((diff / (1000 * 60)) % 60);
        const seconds = Math.floor((diff / 1000) % 60);

        countdownEl.textContent = `${days}d ${hours}h ${minutes}m ${seconds}s`;
      }

      updateCountdown();
      setInterval(updateCountdown, 1000);

      barba.init({
        transitions: [
          {
            name: "fade",
            leave(data) {
              return gsap.to(data.current.container, {
                opacity: 0,
                duration: 0.5,
              });
            },
            enter(data) {
              return gsap.from(data.next.container, {
                opacity: 0,
                duration: 0.5,
              });
            },
          },
        ],
      });
    </script>
  </body>
</html>
