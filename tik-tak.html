<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brunno Lukka — Tik Tak</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js"></script>
    <script src="https://unpkg.com/@barba/core"></script>
    <style>
      video.bg-video {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        min-height: 100%;
        object-fit: cover;
        z-index: -1;
      }
    </style>
  </head>

  <body
    class="relative min-h-[100dvh] bg-black text-white overflow-y-auto"
    data-barba="wrapper"
  >
    <div data-barba="container" data-barba-namespace="tik-tak">
      <a href="./index.html" class="absolute top-6 left-6 z-20">
        <img
          src="./logobrunno.png"
          alt="Brunno Lukka"
          class="h-12 md:h-16 hover:opacity-80 transition"
        />
      </a>

      <video class="bg-video" autoplay muted loop playsinline>
        <source src="./src/bg-loop.mp4" type="video/mp4" />
      </video>

      <div class="absolute inset-0 bg-black/65 z-0"></div>

      <main
        class="relative z-10 flex flex-col items-center justify-center text-center min-h-[100dvh] space-y-6 px-4 py-10"
      >
        <div class="w-full max-w-sm md:max-w-md space-y-4">
          <img
            src="./src/tiktak.jpg"
            alt="Tik Tak cover art"
            class="w-full rounded-xl shadow-2xl border border-white/20"
          />
          <iframe
            style="border-radius: 12px"
            title="Spotify — Tik Tak"
            src="https://open.spotify.com/embed/track/1glYgPmLgekDVxXWou9dcr?utm_source=generator&theme=0"
            width="100%"
            height="152"
            frameBorder="0"
            allowfullscreen=""
            allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
            loading="lazy"
            class="rounded-lg"
          ></iframe>
        </div>

        <p class="text-xs md:text-sm uppercase tracking-[3px] text-gray-300">
          Brunno Lukka
        </p>
        <h1 class="text-3xl md:text-4xl font-semibold tracking-wide drop-shadow-lg">
          Tik Tak
        </h1>
        <p class="text-base md:text-lg text-cyan-300/95 max-w-2xl italic leading-relaxed">
          «Tengo la mente haciendo, Tik, Tak, Tak, Tak…»
        </p>
        <p class="text-sm md:text-base text-gray-300 max-w-2xl">
          Tech House a 132 BPM con un hook que no suelta la cabeza — groove latino y energía de club.
        </p>

        <div class="bg-cyan-500/10 border border-cyan-400/50 rounded-xl px-5 py-4 max-w-xl w-full">
          <p class="text-xs uppercase tracking-widest text-cyan-300 mb-1">Out now</p>
          <p class="text-lg md:text-xl font-semibold text-white">Available on all platforms</p>
          <p class="text-sm text-white/70 mt-1">Released June 11, 2026</p>
        </div>

        <div class="flex flex-wrap justify-center gap-3 mt-1">
          <a
            href="https://open.spotify.com/track/1glYgPmLgekDVxXWou9dcr"
            target="_blank"
            rel="noopener noreferrer"
            class="px-3 md:px-4 py-2 bg-green-500/80 hover:bg-green-500 rounded-full text-xs md:text-sm font-semibold transition"
            >Spotify</a
          >
          <a
            href="https://www.youtube.com/@brunnolukka"
            target="_blank"
            rel="noopener noreferrer"
            class="px-3 md:px-4 py-2 bg-red-600/80 hover:bg-red-600 rounded-full text-xs md:text-sm font-semibold transition"
            >YouTube</a
          >
          <a
            href="https://www.instagram.com/brunnolukka"
            target="_blank"
            rel="noopener noreferrer"
            class="px-3 md:px-4 py-2 bg-pink-600/80 hover:bg-pink-600 rounded-full text-xs md:text-sm font-semibold transition"
            >Instagram</a
          >
        </div>
      </main>
    </div>

    <script>
      barba.init({
        transitions: [
          {
            name: "fade",
            leave(data) {
              return gsap.to(data.current.container, {
                opacity: 0,
                duration: 0.5,
              });
            },
            enter(data) {
              return gsap.from(data.next.container, {
                opacity: 0,
                duration: 0.5,
              });
            },
          },
        ],
      });
    </script>
  </body>
</html>
