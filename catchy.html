<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brunno Lukka — Catchy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js"></script>
    <script src="https://unpkg.com/@barba/core"></script>
    <style>
      video.bg-video {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        min-height: 100%;
        object-fit: cover;
        z-index: -1;
      }
    </style>
  </head>

  <body
    class="relative min-h-[100dvh] bg-black text-white overflow-y-auto"
    data-barba="wrapper"
  >
    <div data-barba="container" data-barba-namespace="catchy">
      <a href="./index.html" class="absolute top-6 left-6 z-20">
        <img
          src="./logobrunno.png"
          alt="Brunno Lukka"
          class="h-12 md:h-16 hover:opacity-80 transition"
        />
      </a>

      <video class="bg-video" autoplay muted loop playsinline>
        <source src="./src/bg-loop.mp4" type="video/mp4" />
      </video>

      <div class="absolute inset-0 bg-black/60 z-0"></div>

      <main
        class="relative z-10 flex flex-col items-center justify-center text-center min-h-[100dvh] space-y-6 px-4 py-10"
      >
        <div class="w-full max-w-md mb-2">
          <iframe
            style="border-radius: 12px"
            title="Spotify — Catchy"
            src="https://open.spotify.com/embed/track/3FGsQSyOBnjmQ63fiQ00YY?utm_source=generator&theme=0"
            width="100%"
            height="152"
            frameBorder="0"
            allowfullscreen=""
            allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
            loading="lazy"
            class="rounded-lg"
          ></iframe>
        </div>

        <p class="text-xs md:text-sm uppercase tracking-[3px] text-gray-300">
          Brunno Lukka
        </p>
        <h1
          class="text-3xl md:text-4xl font-semibold tracking-wide drop-shadow-lg"
        >
          Catchy
        </h1>
        <p class="text-sm md:text-base text-gray-300 max-w-2xl">
          House con hook memorable y drive constante; 128 BPM, pensado para la pista.
        </p>

        <div class="flex flex-wrap justify-center gap-3 mt-2">
          <a
            href="https://open.spotify.com/track/3FGsQSyOBnjmQ63fiQ00YY"
            target="_blank"
            rel="noopener noreferrer"
            class="px-3 md:px-4 py-2 bg-green-500/80 hover:bg-green-500 rounded-full text-xs md:text-sm font-semibold transition"
            >Spotify</a
          >
          <a
            href="https://geo.music.apple.com/us/album/_/1892256832?i=1892256833&mt=1&app=music&ls=1&at=1000lHKX&ct=api_http&itscg=30200&itsct=odsl_m"
            target="_blank"
            rel="noopener noreferrer"
            class="px-3 md:px-4 py-2 bg-gray-300/80 hover:bg-gray-300 text-black rounded-full text-xs md:text-sm font-semibold transition"
            >Apple Music</a
          >
          <a
            href="https://www.youtube.com/watch?v=75z4eHfPNnU"
            target="_blank"
            rel="noopener noreferrer"
            class="px-3 md:px-4 py-2 bg-red-600/80 hover:bg-red-600 rounded-full text-xs md:text-sm font-semibold transition"
            >YouTube</a
          >
          <a
            href="https://www.deezer.com/track/3948349631"
            target="_blank"
            rel="noopener noreferrer"
            class="px-3 md:px-4 py-2 bg-blue-500/80 hover:bg-blue-500 rounded-full text-xs md:text-sm font-semibold transition"
            >Deezer</a
          >
          <a
            href="https://open.spotify.com/artist/4Y4H5coOYsdCFUSCGg8tRK"
            target="_blank"
            rel="noopener noreferrer"
            class="px-3 md:px-4 py-2 bg-yellow-500/80 hover:bg-yellow-500 text-black rounded-full text-xs md:text-sm font-semibold transition"
            >Amazon Music</a
          >
        </div>
      </main>
    </div>

    <script>
      barba.init({
        transitions: [
          {
            name: "fade",
            leave(data) {
              return gsap.to(data.current.container, {
                opacity: 0,
                duration: 0.5,
              });
            },
            enter(data) {
              return gsap.from(data.next.container, {
                opacity: 0,
                duration: 0.5,
              });
            },
          },
        ],
      });
    </script>
  </body>
</html>
